function fmt(t){t=Math.max(0,Math.round(t));return Math.floor(t/60)+':'+String(t%60).padStart(2,'0');}
let VOICE=null;
function pickVoice(){ if(!('speechSynthesis'in window))return; const vs=window.speechSynthesis.getVoices()||[]; if(!vs.length)return;
 const en=vs.filter(v=>/^en/i.test(v.lang)); const pool=en.length?en:vs;
 // Confident, natural-sounding neural voices carry the most presence.
 const lead=['aria','jenny','michelle','ava','emma','sonia','libby'];
 const natural=v=>/online|natural|neural/i.test(v.name);
 const jenny=['jenny'];
 const fem=['female','samantha','karen','victoria','zira','joanna','salli','kendra','aria','sonia','libby','fiona','serena','allison','ava','emma','amelie','nicky','google uk english female','google us english'];
 const male=['male','david','mark','daniel','alex','fred','george','rishi','oliver','thomas','guy'];
 // 1) A natural/neural voice from the confident-leader shortlist.
 let best=pool.find(v=>natural(v)&&lead.some(k=>v.name.toLowerCase().includes(k)));
 // 2) Jenny (warm + assured), natural first then any.
 if(!best) best=pool.find(v=>natural(v)&&jenny.some(k=>v.name.toLowerCase().includes(k)));
 if(!best) best=pool.find(v=>jenny.some(k=>v.name.toLowerCase().includes(k)));
 // 3) Any leader-shortlist voice, then any female voice.
 if(!best) best=pool.find(v=>lead.some(k=>v.name.toLowerCase().includes(k)));
 if(!best) best=pool.find(v=>fem.some(k=>v.name.toLowerCase().includes(k)));
 if(!best) best=pool.find(v=>!male.some(k=>v.name.toLowerCase().includes(k)));
 VOICE=best||pool[0]||null;
}
const voiceSel=document.getElementById('voicesel');
function populateVoices(){ if(!('speechSynthesis'in window))return; const vs=window.speechSynthesis.getVoices()||[]; if(!vs.length)return;
 const en=vs.filter(v=>/^en/i.test(v.lang)); const list=(en.length?en:vs);
 voiceSel.innerHTML=''; list.forEach(v=>{const o=document.createElement('option'); o.value=v.name;
  o.textContent=v.name.replace(/Microsoft |Google /,'').slice(0,26)+(/female|aria|jenny|samantha|zira|joanna|salli|emma/i.test(v.name)?' \u2640':'');
  if(VOICE&&v.name===VOICE.name)o.selected=true; voiceSel.appendChild(o);}); }
if(voiceSel){ voiceSel.onchange=()=>{ const vs=window.speechSynthesis.getVoices()||[]; const c=vs.find(v=>v.name===voiceSel.value); if(c){VOICE=c; if(playing)startScene();} }; }
function voicesReady(){ pickVoice(); populateVoices(); }
if('speechSynthesis'in window){ voicesReady(); try{window.speechSynthesis.onvoiceschanged=voicesReady;}catch(e){} }
let speakToken=0, fallbackT=null, progT=null, sceneStart=0;
function speak(text,onDone){ if(muted||!('speechSynthesis'in window))return; try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.98;u.pitch=0.96;u.volume=1;if(VOICE)u.voice=VOICE;const tok=++speakToken;u.onend=()=>{ if(tok!==speakToken||!playing)return; if(onDone)onDone(); };window.speechSynthesis.speak(u);}catch(e){} }

    shot.classList.add('show');lower.classList.add('show'); });
  kicker.textContent=s.kicker;titleEl.textContent=s.title;caption.textContent=s.caption;
  dots.forEach((d,n)=>{d.classList.toggle('active',n===i);d.classList.toggle('done',n<i);});
}
function clearTimers(){ if(fallbackT){clearTimeout(fallbackT);fallbackT=null;} if(progT){cancelAnimationFrame(progT);progT=null;} }
function progressLoop(){ if(!playing)return; const s=SCENES[i]; const el=(performance.now()-sceneStart)/1000; const p=Math.min(1,el/s.dur);
  fill.style.width=((durBefore(i)+p*s.dur)/total*100)+'%'; curEl.textContent=fmt(durBefore(i)+p*s.dur); progT=requestAnimationFrame(progressLoop); }
// Advance right after the narration for scene n finishes (small buffer), with a
// safety fallback so a silent/muted scene still moves on.
function startScene(){ clearTimers(); const myIdx=i; sceneStart=performance.now(); progT=requestAnimationFrame(progressLoop);
  const s=SCENES[i]; const done=()=>{ if(myIdx!==i||!playing)return; advanceFrom(myIdx); };
  const hasTTS=('speechSynthesis'in window)&&!muted;
  const fallbackMs=Math.round((s.dur+(hasTTS?4:0))*1000);
  fallbackT=setTimeout(done,fallbackMs);
  if(hasTTS){ speak(s.narr,()=>setTimeout(done,280)); }
}
function advanceFrom(n){ if(n!==i||!playing)return; clearTimers(); if(i>=SCENES.length-1){ finish(); return; } i++; render(); startScene(); }
function finish(){ playing=false; clearTimers(); if('speechSynthesis'in window)window.speechSynthesis.cancel(); fill.style.width='100%'; curEl.textContent=fmt(total); playIcon.querySelector('path').setAttribute('d',PLAY_D); bigplay.classList.remove('hidden'); }
function go(n){ n=(n+SCENES.length)%SCENES.length; i=n; clearTimers(); render(); if(playing){ startScene(); } else { fill.style.width=(durBefore(i)/total*100)+'%'; curEl.textContent=fmt(durBefore(i)); } }
function play(){ playing=true; startedOnce=true; bigplay.classList.add('hidden'); playIcon.querySelector('path').setAttribute('d',PAUSE_D); startScene(); }
function pause(){ playing=false; clearTimers(); if('speechSynthesis'in window)window.speechSynthesis.cancel(); playIcon.querySelector('path').setAttribute('d',PLAY_D); bigplay.classList.remove('hidden'); }
function toggle(){ playing?pause():play(); }

playBtn.onclick=toggle; bigplay.onclick=play;
document.getElementById('next').onclick=()=>go(i+1);
document.getElementById('prev').onclick=()=>go(i-1);
document.getElementById('restart').onclick=()=>{go(0);};
document.getElementById('mute').onclick=()=>{ muted=!muted; if(muted){if('speechSynthesis'in window)window.speechSynthesis.cancel();wave.style.display='none';muteIcon.style.opacity=.5;}else{wave.style.display='';muteIcon.style.opacity=1;if(playing)startScene();} };
document.getElementById('track').onclick=(e)=>{ const r=e.currentTarget.getBoundingClientRect(); const frac=(e.clientX-r.left)/r.width; let acc=0; for(let n=0;n<SCENES.length;n++){acc+=SCENES[n].dur; if(frac*total<=acc){go(n);break;}} };
window.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();toggle();} if(e.code==='ArrowRight')go(i+1); if(e.code==='ArrowLeft')go(i-1); });

render(); curEl.textContent='0:00';
</script>
</body>
</html>
